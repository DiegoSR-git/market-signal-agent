name: Resumen Diario De Mercado

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These map to 08:15 and 22:15 Europe/Madrid during CEST.
    - cron: "15 6 * * *"
    - cron: "15 20 * * *"

permissions:
  contents: write
  models: read

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Send daily report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ vars.TELEGRAM_CHAT_IDS }}
          GITHUB_TOKEN: ${{ github.token }}
          ETF_DATE: ${{ vars.ETF_DATE }}
          ETF_TOTAL_MUSD: ${{ vars.ETF_TOTAL_MUSD }}
          ETF_IBIT_MUSD: ${{ vars.ETF_IBIT_MUSD }}
        run: python agent.py --mode daily --force
      - name: Persist state and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json signals_log.csv docs/dashboard.html docs/index.html docs/opportunities.html || true
          git diff --cached --quiet || git commit -m "Update daily report state [skip ci]"
          git push || true
