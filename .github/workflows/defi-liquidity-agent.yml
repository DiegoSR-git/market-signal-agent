name: DeFi Liquidity Agent

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force Telegram alert for testing"
        required: false
        default: "false"
  schedule:
    # GitHub cron uses UTC. These map to 08:45 and 22:45 Europe/Madrid during CEST.
    - cron: "45 6,20 * * *"

permissions:
  contents: write
  models: read

jobs:
  defi-liquidity-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run DeFi liquidity agent
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ vars.TELEGRAM_CHAT_IDS }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python -u defi_liquidity_agent.py --force
          else
            python -u defi_liquidity_agent.py
          fi
      - name: Persist DeFi liquidity state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add defi_liquidity_state.json defi_liquidity_snapshot.json defi_liquidity_log.csv docs/defi_liquidity_dashboard.html docs/index.html || true
          git diff --cached --quiet || git commit -m "Update DeFi liquidity agent state [skip ci]"
          git push || true
