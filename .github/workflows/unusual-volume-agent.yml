name: Agente De Volumen Inusual

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force Telegram alert for testing"
        required: false
        default: "false"
  schedule:
    # GitHub cron uses UTC. These map to 08:40 and 22:40 Europe/Madrid during CEST.
    - cron: "40 6,20 * * *"

permissions:
  contents: write
  models: read

jobs:
  unusual-volume-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run unusual volume agent
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ vars.TELEGRAM_CHAT_IDS }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python -u unusual_volume_agent.py --force
          else
            python -u unusual_volume_agent.py
          fi
      - name: Persist unusual volume state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add unusual_volume_state.json unusual_volume_snapshot.json unusual_volume_log.csv docs/unusual_volume_dashboard.html docs/index.html || true
          git diff --cached --quiet || git commit -m "Update unusual volume agent state [skip ci]"
          git push || true
