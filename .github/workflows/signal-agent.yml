name: Market Signal Agent

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force Telegram alert for testing"
        required: false
        default: "false"
  schedule:
    # GitHub cron uses UTC. These map to 08:05 and 22:05 Europe/Madrid during CEST.
    - cron: "5 6 * * *"
    - cron: "5 20 * * *"

permissions:
  contents: write
  models: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run signal agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ vars.TELEGRAM_CHAT_IDS }}
          GITHUB_TOKEN: ${{ github.token }}
          ETF_DATE: ${{ vars.ETF_DATE }}
          ETF_TOTAL_MUSD: ${{ vars.ETF_TOTAL_MUSD }}
          ETF_IBIT_MUSD: ${{ vars.ETF_IBIT_MUSD }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python agent.py --mode signal --force
          else
            python agent.py --mode signal
          fi
      - name: Persist state and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json signals_log.csv docs/dashboard.html docs/index.html || true
          git diff --cached --quiet || git commit -m "Update agent state/dashboard [skip ci]"
          git push || true
