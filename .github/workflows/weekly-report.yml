name: Weekly Regime Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 0"

permissions:
  contents: write
  models: read
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Send weekly report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          ETF_DATE: ${{ vars.ETF_DATE }}
          ETF_TOTAL_MUSD: ${{ vars.ETF_TOTAL_MUSD }}
          ETF_IBIT_MUSD: ${{ vars.ETF_IBIT_MUSD }}
        run: python agent.py --mode weekly --force
      - name: Run baseline backtest
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          ETF_DATE: ${{ vars.ETF_DATE }}
          ETF_TOTAL_MUSD: ${{ vars.ETF_TOTAL_MUSD }}
          ETF_IBIT_MUSD: ${{ vars.ETF_IBIT_MUSD }}
        run: python agent.py --mode backtest
      - name: Persist state and dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json signals_log.csv docs/dashboard.html docs/index.html || true
          git diff --cached --quiet || git commit -m "Update weekly report state [skip ci]"
          git push || true
