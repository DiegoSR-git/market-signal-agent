name: Agente De Rumores Y Eventos

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force Telegram alert for testing"
        required: false
        default: "false"
  schedule:
    # GitHub cron uses UTC. These map to 08:10 and 22:10 Europe/Madrid during CEST.
    - cron: "10 6 * * *"
    - cron: "10 20 * * *"

permissions:
  contents: write
  models: read

jobs:
  event-rumor-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run event rumor agent
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ vars.TELEGRAM_CHAT_IDS }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python -u event_rumor_agent.py --force
          else
            python -u event_rumor_agent.py
          fi

      - name: Persist event rumor state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add event_rumor_state.json event_rumor_snapshot.json event_rumor_log.csv docs/event_rumor_dashboard.html docs/index.html docs/opportunities.html || true
          git diff --cached --quiet || git commit -m "Update event rumor agent state [skip ci]"
          git push || true
