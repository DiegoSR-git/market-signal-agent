name: Healthcheck Del Agente

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These map to 08:00 and 22:00 Europe/Madrid during CEST.
    - cron: "0 6,20 * * *"

permissions:
  contents: write
  models: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run healthcheck
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ vars.TELEGRAM_CHAT_IDS }}
          GITHUB_TOKEN: ${{ github.token }}
          ETF_DATE: ${{ vars.ETF_DATE }}
          ETF_TOTAL_MUSD: ${{ vars.ETF_TOTAL_MUSD }}
          ETF_IBIT_MUSD: ${{ vars.ETF_IBIT_MUSD }}
        run: python agent.py --mode health --force
