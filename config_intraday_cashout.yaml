agent:
  key: intraday_cashout
  name: Agente Intradia Salida Mismo Dia
  state_file: intraday_cashout_state.json
  snapshot_file: intraday_cashout_snapshot.json
  log_file: intraday_cashout_log.csv
  dashboard_file: docs/intraday_cashout_dashboard.html

alerts:
  min_score_to_alert: 76
  max_alerts: 5
  cooldown_hours: 8

http:
  user_agent: market-signal-agent intraday-cashout
  connect_timeout: 6
  read_timeout: 12
  retries: 1
  retry_delay_seconds: 1

ai:
  enabled: true
  model: openai/gpt-4.1-mini
  timeout_seconds: 45
  max_output_tokens: 700
  max_events: 8
  temperature: 0.1

intraday:
  min_input_score: 50
  max_candidates: 25
  max_hold_hours: 8
  max_stale_seconds: 15
  require_same_session_signals: true
  quote_batch_size: 20
  max_spread_pct: 0.35
  min_premarket_volume: 50000
  max_vwap_distance_pct: 1.2
  min_relative_strength_pct: 0.15
  min_risk_reward: 1.5
  leverage: 5
  account_equity: 1000
  risk_per_trade_pct: 1.0
  max_daily_loss_pct: 3.0
  max_trades_per_day: 3
  max_position_pct: 20.0
  max_spread_reward_cost_pct: 20.0
  max_open_chase_pct: 1.0
  min_trade_notional: 25
  allow_fractional_shares: true
