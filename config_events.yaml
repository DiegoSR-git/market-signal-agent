alerts:
  min_score_to_alert: 70
  max_alerts: 5
  cooldown_hours: 12

news:
  use_google_news_rss: true
  # GDELT es útil, pero se limita por 429/timeouts con muchas consultas.
  # Activalo solo para barridos puntuales o si Google News devuelve poca cobertura.
  use_gdelt: false
  gdelt_timespan: 45d
  gdelt_timeout_seconds: 8
  gdelt_backoff_seconds: 180
  gdelt_max_errors_per_run: 2
  max_companies_per_run: 12
  max_queries_per_company: 6
  max_articles_per_company: 24
  max_articles_per_query: 3
  request_delay_seconds: 0.4

ai:
  enabled: true
  provider: github_models
  model: openai/gpt-4.1-mini
  max_output_tokens: 2200
  temperature: 0.15

