agent:
  key: macro_regime
  name: Macro Regime Agent
  state_file: macro_regime_state.json
  snapshot_file: macro_regime_snapshot.json
  log_file: macro_regime_log.csv
  dashboard_file: docs/macro_regime_dashboard.html

alerts:
  min_score_to_alert: 70
  max_alerts: 3
  cooldown_hours: 12

http:
  user_agent: market-signal-agent macro-regime
  connect_timeout: 6
  read_timeout: 12
  retries: 1
  retry_delay_seconds: 1

ai:
  enabled: true
  model: openai/gpt-4.1-mini
  timeout_seconds: 45
  max_output_tokens: 700
  max_events: 8
  temperature: 0.15

proxies:
  SPY: SPY
  QQQ: QQQ
  IWM: IWM
  TLT: TLT
  HYG: HYG
  LQD: LQD
  GLD: GLD
  UUP: UUP
